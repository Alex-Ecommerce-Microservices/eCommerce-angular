<div class="main-content">
    <div class="section-content section-content-p30">
        <div *ngIf="currentCategoryName">
            <h1>
                Category: {{ currentCategoryName }}
            </h1>
            <hr>
        </div>
        <div class="container-fluid">
            <div class="row">
                <!-- loop over the collection of products -->
                <div *ngFor="let tempProduct of products" class="col-md-3">

                    <div class="product-box">
                        <a routerLink="/products/{{ tempProduct.id }}">
                            <img src="{{ tempProduct.imageUrl }}" class="img-responsive">
                        </a>
                        <a routerLink="/products/{{ tempProduct.id }}">
                            <h1>{{ tempProduct.name }}</h1>
                        </a>

                        <div class="price">{{ tempProduct.unitPrice | currency:'USD' }}</div>

                        <button (click)="addToCard(tempProduct)" class="btn btn-primary btn-sm">Add to card</button>
                    </div>
                </div>
            </div>

            <div *ngIf="products?.length == 0" class="alert alert-warning col-md-12" role="alert">
                No products found.
            </div>

            <div class="footer-pagination">
                <div class="row">
                    <div class="col-md-6"></div>

                    <div class="col-md-6">
                        <div class="row">
                            <div class="col-md-9" style="padding-left: 30%">
                                <!-- should use [page] binding 1 way rather than [(page)] 2 way-->
                                <ngb-pagination [page]="thePageNumber" [pageSize]="thePageSize" [maxSize]="5"
                                    [boundaryLinks]="true" [collectionSize]="theTotalElements"
                                    (pageChange)="pageChange($event)">
                                </ngb-pagination>
                            </div>
                            <div class="col-md-3 mt-2">
                                <span class="mr-2">Page Size</span>
                                <select #pageSizeSelect (change)="updatePageSize(pageSizeSelect.value)">
                                    <option>2</option>
                                    <option selected="true">5</option>
                                    <option>10</option>
                                    <option>50</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
